<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title></title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <link rel="stylesheet" href="TemplateData/style.css">
  <script src="js/a.js"></script>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      height: 100%;
      background: #000;
    }
    #unity-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
    }
    #unity-canvas {
      width: 100%;
      height: 100%;
      background: #000;
    }
   </style>
</head>
<body>
    <div class="webgl-content" style="width: 100%; height: 100%;">
        <div id="unityContainer" style="width: 100%; height: 100%;"></div>
    </div>

    <script>
      if (typeof cpmstarAPI === "undefined") {
        function cpmstarAPI(options) {
          if (options && options.kind === "game.displayInterstitial") {
              window.parent.postMessage({ type: "commercialBreak" }, "*");
          }
        }
      }

      function invokeApplixirVideoUnit(options) {
        if (typeof options.adStatusCb === "function") {
            options.adStatusCb("");
        }
      }
    </script>

    <script src="../UnityProgress.js"></script>
    <script src="../UnityLoader.js"></script>

	<script>
        var unityInstance = UnityLoader.instantiate("unityContainer", "Build/Game.json", {onProgress: UnityProgress});
    </script>
</body>
</html>
